<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            background-color: #77A1D3;
            background-size: cover;
            min-height: 100vh;
            background-image: url("./loginimage.png");
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center right;
            background-size: 30%;
        }

        .parent-container {
            background-color: white;
            width: 30%;
            text-align: center;
            padding: 20px;
            font-family: sans-serif;
            margin: 8% auto;
            border-radius: 10px;
        }

        .form-field {
            margin: 15px 0;
            text-align: left;
        }

        .form-field input {
            padding: 10px;
            width: 95%;
            font-size: 0.9rem;
            border: 1px solid rgba(0, 0, 0, 0.5);
            border-radius: 5px;
        }

        .forgot {
            text-align: center;
            font-size: 0.8rem;
            color: black;
            font-weight: bold;
        }

        .btn-grad {
            background-image: linear-gradient(to right, #77A1D3, #79CBCA, #77A1D3);
            padding: 12px;
            width: 100%;
            text-transform: uppercase;
            color: white;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .btn-grad:hover {
            background-position: right center;
        }
    </style>
</head>

<body>

    <form class="parent-container" action="./biography.html">

        <h2>LOGIN</h2>

        <div class="form-field">
            <label>Email:</label>
            <input type="email" placeholder="Enter email" name="email" required>
        </div>

        <div class="form-field">
            <label>Password:</label>
            <input type="password" placeholder="Enter password" name="password" required>
        </div>

        <div class="forgot">
            <a href="#">Forgot Password?</a>
        </div>

        <button class="btn-grad">Login</button>

        <p>Don't have an account? <a href="./index.html">Register</a></p>

    </form>

</body>

</html>
